name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "mongodb://localhost:27017/carbonwise"
      JWT_SECRET: "ci-test-secret-at-least-sixteen-chars-long"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
