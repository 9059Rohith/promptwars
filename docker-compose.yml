services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:./prisma/dev.db"
      JWT_SECRET: "${JWT_SECRET:-change-me-to-a-long-random-secret-string}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
    restart: unless-stopped
